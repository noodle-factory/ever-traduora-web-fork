name: build on demand

on:
  workflow_call:
    inputs:
      AWS_REGION:
        required: true
        type: string

jobs:
  build-and-test:
    name: Build and test
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set sha_short
        id: vars
        run: echo "::set-output name=sha_short::${GITHUB_SHA::7}"

      - name: Check outputs sha_short
        run: echo ${{ steps.vars.outputs.sha_short }}

      - name: Build on MASTER branch
        if: github.ref_name == 'master'
        id: build-master-image
        env:
          IMAGE_NAME: ${{ secrets.ECR_REGISTRY_URI }}/${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          # Build a docker container and push it to ECR so that it can be deployed to EKS.
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:master-latest .
          docker push $IMAGE_NAME --all-tags
          echo "$MAGE_NAME:$IMAGE_TAG"
#          echo "::set-output name=image::$$MAGE_NAME:$IMAGE_TAG"

      - name: Build on RELEASE branch
        if: github.ref_name == 'release'
        id: build-release-image
        env:
          IMAGE_NAME: ${{ secrets.ECR_REGISTRY_URI }}/${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          # Build a docker container and push it to ECR so that it can be deployed to EKS.
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:release-latest .
          docker push $IMAGE_NAME --all-tags
          echo "$MAGE_NAME:$IMAGE_TAG"
#          echo "::set-output name=image::$$MAGE_NAME:$IMAGE_TAG"
